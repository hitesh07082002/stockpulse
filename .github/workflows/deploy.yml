name: Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/stockpulse

            if grep -q '^APP_IMAGE_TAG=' .env; then
              sed -i.bak "s/^APP_IMAGE_TAG=.*/APP_IMAGE_TAG=${{ github.sha }}/" .env
            else
              echo "APP_IMAGE_TAG=${{ github.sha }}" >> .env
            fi

            APP_IMAGE_TAG=${{ github.sha }} docker compose pull web
            APP_IMAGE_TAG=${{ github.sha }} docker compose up -d --remove-orphans
            docker exec stockpulse-web python manage.py check --deploy --fail-level WARNING
            docker exec stockpulse-web python manage.py migrate --noinput

            RUNNING_IMAGE=$(docker inspect stockpulse-web --format '{{.Config.Image}}')
            case "$RUNNING_IMAGE" in
              *:${{ github.sha }}) ;;
              *)
                echo "Unexpected running image: $RUNNING_IMAGE"
                exit 1
                ;;
            esac
            sleep 5
            curl -sf \
              -H "Host: stockpulse.hiteshsadhwani.xyz" \
              -H "X-Forwarded-Proto: https" \
              http://127.0.0.1:8000/api/health/ || exit 1
