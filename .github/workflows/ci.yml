name: CI

on:
  workflow_call:
  pull_request:
    branches:
      - main
      - rewrite/**
  push:
    branches:
      - main
      - rewrite/**

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stockpulse
          POSTGRES_USER: stockpulse
          POSTGRES_PASSWORD: stockpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockpulse -d stockpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://stockpulse:stockpulse@127.0.0.1:5432/stockpulse
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Django system check
        run: python backend/manage.py check

      - name: Backend tests
        run: python -m pytest backend

      - name: Backend coverage
        run: python -m pytest backend --cov=stocks --cov-config=backend/.coveragerc --cov-report=term-missing --cov-report=xml:backend/coverage.xml

      - name: Upload backend coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Frontend coverage
        working-directory: frontend
        run: npm run coverage

      - name: Upload frontend coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: Frontend build
        working-directory: frontend
        run: npm run build

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: stockpulse
          POSTGRES_USER: stockpulse
          POSTGRES_PASSWORD: stockpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockpulse -d stockpulse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://stockpulse:stockpulse@127.0.0.1:5432/stockpulse
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: ${{ hashFiles('frontend/playwright.config.*') != '' && steps.playwright-cache.outputs.cache-hit != 'true' }}
        working-directory: frontend
        run: npx playwright install chromium

      - name: Start backend
        if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
        run: |
          python backend/manage.py migrate
          nohup python backend/manage.py runserver 127.0.0.1:8000 > /tmp/stockpulse-backend.log 2>&1 &

      - name: Start frontend
        if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
        working-directory: frontend
        run: nohup npm run dev -- --host 127.0.0.1 --port 5173 > /tmp/stockpulse-frontend.log 2>&1 &

      - name: Wait for app
        if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
        run: |
          python - <<'PY'
          import time
          import urllib.request

          urls = [
              "http://127.0.0.1:8000/api/companies/",
              "http://127.0.0.1:5173/",
          ]
          for url in urls:
              for _ in range(60):
                  try:
                      with urllib.request.urlopen(url, timeout=2) as response:
                          if response.status < 500:
                              break
                  except Exception:
                      time.sleep(1)
              else:
                  raise SystemExit(f"Timed out waiting for {url}")
          PY

      - name: Run smoke suite
        if: ${{ hashFiles('frontend/playwright.config.*') != '' }}
        working-directory: frontend
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: ${{ always() && hashFiles('frontend/playwright.config.*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results

      - name: Upload app logs
        if: ${{ always() && hashFiles('frontend/playwright.config.*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-logs
          path: |
            /tmp/stockpulse-backend.log
            /tmp/stockpulse-frontend.log
