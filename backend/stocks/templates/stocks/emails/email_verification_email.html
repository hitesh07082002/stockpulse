<html>
  <body style="margin:0;padding:0;background:#0b1020;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <div style="max-width:560px;margin:0 auto;padding:32px 20px;">
      <div style="background:#111827;border:1px solid #1f2937;border-radius:20px;padding:32px;">
        <p style="margin:0 0 12px;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#f59e0b;">
          StockPulse
        </p>
        <h1 style="margin:0 0 16px;font-size:28px;line-height:1.15;color:#f8fafc;">
          Verify your email
        </h1>
        <p style="margin:0 0 16px;font-size:16px;line-height:1.6;color:#cbd5e1;">
          Finish creating your account by confirming this email address.
        </p>
        <p style="margin:0 0 24px;">
          <a
            href="{{ verification_link }}"
            style="display:inline-block;border-radius:999px;background:#f59e0b;color:#111827;padding:14px 24px;font-size:15px;font-weight:700;text-decoration:none;"
          >
            Verify email
          </a>
        </p>
        <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#94a3b8;">
          This link expires in {{ expiry_minutes }} minutes.
        </p>
        <p style="margin:0;font-size:14px;line-height:1.6;color:#94a3b8;">
          If you did not sign up for StockPulse, you can ignore this email.
        </p>
      </div>
    </div>
  </body>
</html>
