services:
  web:
    container_name: stockpulse-web
    build:
      context: .
      dockerfile: Dockerfile
    image: stockpulse:dev
    environment:
      DEBUG: "True"
      SECRET_KEY: docker-dev-secret
      DATABASE_URL: postgres://stockpulse:stockpulse@db:5432/stockpulse
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    command: python manage.py runserver 0.0.0.0:8000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  db:
    container_name: stockpulse-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockpulse
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: stockpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse -d stockpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
